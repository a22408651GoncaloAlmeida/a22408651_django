<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Accounts{% endblock %}</title>
    {% load static %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #1a1a2e; margin-bottom: 1.5rem; font-size: 1.5rem; border-left: 4px solid #00d4ff; padding-left: 0.75rem; }
        form p { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; }
        .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 5px; font-size: 0.95rem; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary { background: #1a1a2e; color: white; width: 100%; text-align: center; margin-top: 0.5rem; }
        .btn-primary:hover { opacity: 0.85; }
        .erro { background: #ffe0e0; color: #c00; padding: 0.75rem; border-radius: 5px; margin-bottom: 1rem; font-size: 0.9rem; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        .link a { color: #0077cc; }
    </style>
</head>
<body>
    <div class="auth-box">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
