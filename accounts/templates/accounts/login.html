{% extends 'accounts/base_accounts.html' %}
{% block title %}Login{% endblock %}
{% block content %}
    <h1>Login</h1>
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
    <form method="post">
        {% csrf_token %}
        <p><label>Username</label><input type="text" name="username" required></p>
        <p><label>Password</label><input type="password" name="password" required></p>
        <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
    <div class="link">Não tens conta? <a href="{% url 'registo' %}">Registar</a></div>
    <div class="link">Preferes entrar sem senha? <a href="{% url 'magic_link_request' %}">Link Mágico</a></div>
{% endblock %}
