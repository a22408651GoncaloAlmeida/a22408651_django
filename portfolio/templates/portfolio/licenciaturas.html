<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Licenciaturas</title></head>
<body>
    <h1>Licenciaturas</h1>
    {% for l in licenciaturas %}
        <div>
            <h2>{{ l.nome }} ({{ l.sigla }})</h2>
            <p>ECTS totais: {{ l.ects_totais }}</p>
            <p>Duração: {{ l.duracao_anos }} anos</p>
            <p>Regime: {{ l.get_regime_display }}</p>
        </div>
    {% empty %}
        <p>Nenhuma licenciatura encontrada.</p>
    {% endfor %}
</body>
</html>
